name: CI
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Lint
        run: cargo clippy -- -D warnings
      - name: Check formatting
        run: cargo fmt --check
      - name: Test
        run: cargo test

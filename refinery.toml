version = 1
platform = "github"
lang = "rust"

[release]
strip = true
lto = true
codegenUnits = 1
panic = "abort"

[[artifacts]]
name = "tyg"
type = "bin"
outputName = "{name}-{os}-{arch}"

[[targets]]
id = "linux-x64"
for = "tyg"
os = "linux"
arch = ["x86_64"]
abi = "gnu"
packages = ["bin"]

[[targets]]
id = "windows-x64"
for = "tyg"
os = "windows"
arch = ["x86_64", "arm64"]
abi = "msvc"
packages = ["bin"]

[[targets]]
id = "macos-all"
for = "tyg"
os = "macos"
arch = ["x86_64", "arm64"]
packages = ["bin"]

[[publish]]
type = "builtin"
builtin = "download_artifact"
targets = "all"

[[publish]]
type = "builtin"
builtin = "github_release"
targets = "all"

[[publish]]
type = "composite"
name = "Publish to crates.io"
action = "publish-crates-io"
secrets = ["CARGO_REGISTRY_TOKEN"]
targets = "once"
